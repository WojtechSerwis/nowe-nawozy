<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kalkulator nawozów</title>
<style>
body { font-family: Arial; max-width: 900px; margin: auto; background-color: #121212; color: #e0e0e0; }
input { margin: 5px; background-color: #1e1e1e; color: #e0e0e0; border: 1px solid #444; padding: 5px; width: 60px; box-sizing: border-box; direction: ltr; }
.result, .history-box { margin-top: 28px; font-weight: bold; background: #181818; padding: 14px; border-radius: 10px; border: 1px solid #2b2b2b; }
button { background-color: #3a3a3a; color: white; border: none; padding: 8px 15px; margin: 5px; cursor: pointer; border-radius: 6px; }
button:hover { background-color: #4a4a4a; }
button.primary-btn { background-color: #2e7d32; }
button.primary-btn:hover { background-color: #388e3c; }
.tabs button { margin: 5px; }
.tab { display: none; }
.active { display: block; }
.box { background:#1e1e1e; padding:14px; border-radius:10px; margin-top:16px; }
.box b { display:block; font-size:15px; color:#fff; margin-bottom:8px; }
.box p { margin-top:4px; margin-bottom:10px; }
.low { background-color: #000; color: #fff; padding:2px 4px; border-radius:4px; }
.correct { background-color: #4caf50; color: #fff; padding:2px 4px; border-radius:4px; }
.high { background-color: #f44336; color: #fff; padding:2px 4px; border-radius:4px; }
.warning { color: #ffeb3b; }
.box table { width: auto; border-collapse: collapse; }
.box table td { padding: 5px; text-align: left; vertical-align: middle; }
.box table input { text-align: left; width: 60px; box-sizing: border-box; direction: ltr; }
.history-entry { border-radius: 6px; padding: 8px; margin-bottom: 10px; background-color: #151515; border:1px solid #2a2a2a; font-size: 13px; }
.history-entry table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.history-entry td, .history-entry th { padding: 2px 4px; font-size: 12px; border-bottom: 1px solid #333; text-align: center; }
.history-entry th { background-color: #2e2e2e; }
.history-entry .param-value.low { background-color: #000; }
.history-entry .param-value.correct { background-color: #4caf50; color: #fff; }
.history-entry .param-value.high { background-color: #f44336; color: #fff; }
.history-entry .param-value.warning { background-color: #ffeb3b; color: #000; }
.history-entry .dose, .history-entry .water {
    display: block;
    margin: 0 auto;
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 12px;
    text-align: center;
}
.history-entry .dose { background-color: #2196f3; color: #fff; }
.history-entry .water { background-color: #ff9800; color: #000; }
.status-bar { margin-top:12px; font-size:12px; color:#aaa; line-height:1.5; }
.alert-box { margin-top:8px; font-size:12px; color:#ffeb3b; }
.small-btn { padding:4px 8px; margin-left:8px; }
.trend-box { margin-top:10px; font-size:12px; color:#aaa; line-height:1.5; }
.plan-section-title { font-size:13px; color:#fff; font-weight:bold; padding-top:8px; }
.plan-note { font-size:12px; color:#aaa; }
.plan-pill { display:inline-block; padding:2px 6px; border-radius:4px; margin:2px 4px 2px 0; font-size:12px; background:#2a2a2a; }
.plan-day { background:#263238; color:#fff; padding:4px 6px; border-radius:6px; font-weight:bold; }
.plan-dose { display:inline-block; min-width:72px; padding:2px 6px; border-radius:4px; margin:2px 4px 2px 0; font-size:12px; text-align:center; background:#1f1f1f; }
.plan-total { font-size:12px; color:#aaa; padding-top:6px; }
.readable-plan table { border-collapse:separate; border-spacing:0 6px; width:100%; }
.readable-plan td { vertical-align:top; }
.readable-plan .label-col { width:170px; color:#ddd; }
select { background-color: #1e1e1e; color: #e0e0e0; border: 1px solid #444; padding: 5px; }
@media (max-width: 500px) {
  body { max-width: 95%; }
  input { width: 90%; }
  button { width: 90%; }
  .result, .history-box { display: block; width: 100%; margin-left: 0; }
}
</style>
</head>
<body>

<h2>Kalkulator nawozów</h2>
<p style="font-size:12px;color:#aaa;">Wartości oparte na nawozach Aquaforest AF</p>

<div class="tabs">
<button onclick="showTab('t1')">240L (200L)</button>
<button onclick="showTab('t2')">130L (110L)</button>
<button onclick="showTab('t3')">72L (60L)</button>
<button onclick="showTab('t4')">26L (20L)</button>
</div>

<div id="t1" class="tab active"></div>
<div id="t2" class="tab"></div>
<div id="t3" class="tab"></div>
<div id="t4" class="tab"></div>

<script>
const tanks = { t1: 240, t2: 130, t3: 72, t4: 26 };
const effectiveVolumes = { t1: 200, t2: 110, t3: 60, t4: 20 };
const params = ['no3','po4','k','fe'];
const techProfiles = {
    high: { label: 'High Tech', target: { no3: 10, po4: 1, k: 20, fe: 0.4 }, microFactor: 8 },
    low: { label: 'Low Tech', target: { no3: 5, po4: 0.5, k: 10, fe: 0.1 }, microFactor: 4 }
};

const customPresets = {
    t1: {
        mode: 'high',
        target: { no3: 12, po4: 0.8, k: 16, fe: 0.10 },
        waterChange: 70,
        dosing3x: { label: 'Plan 3x w tygodniu', strategy: 'dynamic' },
        note: 'Dynamiczny plan wg testów przed podmianą i podmiany RO dla 240L.'
    },
    t2: {
        mode: 'low',
        target: { no3: 5, po4: 0.2, k: 5, fe: 0.02 },
        waterChange: 45,
        dosing3x: { label: 'Plan 3x w tygodniu', strategy: 'dynamic' },
        note: 'Dynamiczny super low tech: kalkulator bierze pod uwagę testy przed podmianą i ilość podmienionej wody.'
    },
    t3: {
        mode: 'low',
        target: { no3: 6, po4: 0.25, k: 8, fe: 0.07 },
        waterChange: 18,
        dosing3x: { label: 'Plan 3x w tygodniu', strategy: 'dynamic' },
        note: 'Dynamiczny low tech dla epifitów: dawki liczone z testów przed podmianą i ilości podmienionej wody.'
    },
    t4: {
        mode: 'high',
        target: { no3: 8, po4: 0.4, k: 10, fe: 0.06 },
        waterChange: 8,
        dosing3x: { label: 'Plan 3x w tygodniu', strategy: 'dynamic' },
        note: 'Dynamiczny delikatny start dla młodego 26L: dawki liczone z testów przed podmianą i ilości podmienionej wody.'
    }
};

function savePlanState(id, data){
    localStorage.setItem(id + '_plan_state', JSON.stringify(data));
}

function loadPlanState(id){
    try {
        return JSON.parse(localStorage.getItem(id + '_plan_state') || 'null');
    } catch(e){
        return null;
    }
}

function saveAllSettings(id){
    const modeEl = document.getElementById(`tech_${id}`);
    const settings = {
        mode: modeEl ? modeEl.value : 'high',
        wc: document.getElementById(`wc_${id}`)?.value || '',
        strengths: {},
        targets: {},
        measured: {}
    };
    params.forEach(p=>{
        settings.strengths[p] = document.getElementById(`s${p}_${id}`)?.value || '';
        settings.targets[p] = document.getElementById(`t${p}_${id}`)?.value || '';
        settings.measured[p] = document.getElementById(`${p}_${id}`)?.value || '';
    });
    localStorage.setItem(id + '_settings', JSON.stringify(settings));
}

function loadAllSettings(id){
    try {
        const settings = JSON.parse(localStorage.getItem(id + '_settings') || 'null');
        if(!settings) return false;

        const modeEl = document.getElementById(`tech_${id}`);
        if(modeEl && settings.mode) modeEl.value = settings.mode;
        if(settings.wc !== undefined && document.getElementById(`wc_${id}`)) document.getElementById(`wc_${id}`).value = settings.wc;

        params.forEach(p=>{
            const sEl = document.getElementById(`s${p}_${id}`);
            const tEl = document.getElementById(`t${p}_${id}`);
            const mEl = document.getElementById(`${p}_${id}`);
            if(sEl && settings.strengths && settings.strengths[p] !== undefined) sEl.value = settings.strengths[p];
            if(tEl && settings.targets && settings.targets[p] !== undefined){
                tEl.value = settings.targets[p];
                tEl.dataset.manual = '1';
            }
            if(mEl && settings.measured && settings.measured[p] !== undefined) mEl.value = settings.measured[p];
        });
        return true;
    } catch(e){
        return false;
    }
}

function restorePlanView(id){
    const state = loadPlanState(id);
    if(state && state.html && document.getElementById(`out_${id}`)){
        document.getElementById(`out_${id}`).innerHTML = state.html;
    }
    const status = document.getElementById(`plan_status_${id}`);
    if(status && state && state.status){
        status.textContent = state.status;
    }
}



function captureOriginalDefaults(id){
    params.forEach(p=>{
        const tEl = document.getElementById(`t${p}_${id}`);
        const sEl = document.getElementById(`s${p}_${id}`);
        const mEl = document.getElementById(`${p}_${id}`);
        if(tEl && !tEl.dataset.original) tEl.dataset.original = tEl.value;
        if(sEl && !sEl.dataset.original) sEl.dataset.original = sEl.value;
        if(mEl && !mEl.dataset.original) mEl.dataset.original = '';
    });
    const wcEl = document.getElementById(`wc_${id}`);
    if(wcEl && !wcEl.dataset.original) wcEl.dataset.original = '';
    const modeEl = document.getElementById(`tech_${id}`);
    if(modeEl && !modeEl.dataset.original) modeEl.dataset.original = modeEl.value || 'high';
}

function resetToOptimalSettings(id){
    const modeEl = document.getElementById(`tech_${id}`);
    if(modeEl){
        modeEl.value = modeEl.dataset.original || 'high';
    }

    params.forEach(p=>{
        const tEl = document.getElementById(`t${p}_${id}`);
        const sEl = document.getElementById(`s${p}_${id}`);
        const mEl = document.getElementById(`${p}_${id}`);

        if(tEl){
            tEl.value = tEl.dataset.original ?? tEl.defaultValue ?? '';
            tEl.dataset.manual = '0';
        }
        if(sEl){
            sEl.value = sEl.dataset.original ?? sEl.defaultValue ?? '';
        }
        if(mEl){
            mEl.value = mEl.dataset.original ?? '';
            mEl.className = '';
        }
    });

    const wcEl = document.getElementById(`wc_${id}`);
    if(wcEl){
        wcEl.value = wcEl.dataset.original ?? '';
    }

    document.getElementById(`out_${id}`).innerHTML = '';
    applyTechProfile(id, false);
    updateParamColors(id);
    saveAllSettings(id);
    savePlanState(id, { html: '', status: 'Przywrócono ustawienia pierwotne.' });

    const status = document.getElementById(`plan_status_${id}`);
    if(status) status.textContent = 'Przywrócono ustawienia pierwotne.';
}

function applyTechProfile(id, preserveManual = false){
    const mode = document.getElementById(`tech_${id}`)?.value || 'high';
    const profile = techProfiles[mode] || techProfiles.high;
    params.forEach(p=>{
        const input = document.getElementById(`t${p}_${id}`);
        if(!input) return;
        if(!preserveManual || input.dataset.manual !== '1'){
            input.value = profile.target[p];
        }
    });
    const microInfo = document.getElementById(`microinfo_${id}`);
    if(microInfo) microInfo.textContent = `${profile.microFactor} kropli/dzień na 100L`;
    updateParamColors(id);
}




function getTrendSymbol(curr, prev){
    if(prev === null || prev === undefined || isNaN(prev)) return '—';
    if(curr > prev) return '↑';
    if(curr < prev) return '↓';
    return '=';
}

function renderTrendInfo(id){
    const history = JSON.parse(localStorage.getItem(id+'_history') || '[]');
    const el = document.getElementById(`trend_${id}`);
    if(!el) return;
    if(history.length < 2){
        el.innerHTML = 'Trend: NO3 — • PO4 — • K — • Fe —';
        return;
    }
    const last = history[history.length - 1];
    const prev = history[history.length - 2];
    const lastVals = last.raw || { no3:last.no3, po4:last.po4, k:last.k, fe:last.fe };
    const prevVals = prev.raw || { no3:prev.no3, po4:prev.po4, k:prev.k, fe:prev.fe };
    el.innerHTML = `Trend: NO3 ${getTrendSymbol(lastVals.no3, prevVals.no3)} • PO4 ${getTrendSymbol(lastVals.po4, prevVals.po4)} • K ${getTrendSymbol(lastVals.k, prevVals.k)} • Fe ${getTrendSymbol(lastVals.fe, prevVals.fe)}`;
}

function exportBackup(){
    const payload = {};
    Object.keys(tanks).forEach(id=>{
        payload[id] = {
            settings: JSON.parse(localStorage.getItem(id+'_settings') || '{}'),
            history: JSON.parse(localStorage.getItem(id+'_history') || '[]'),
            plan: JSON.parse(localStorage.getItem(id+'_plan_state') || '{}'),
            meta: JSON.parse(localStorage.getItem(id+'_meta') || '{}')
        };
    });
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'kalkulator_akwarium_backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
}

function importBackup(event){
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(e){
        try{
            const payload = JSON.parse(e.target.result);
            Object.keys(payload).forEach(id=>{
                if(payload[id].settings) localStorage.setItem(id+'_settings', JSON.stringify(payload[id].settings));
                if(payload[id].history) localStorage.setItem(id+'_history', JSON.stringify(payload[id].history));
                if(payload[id].plan) localStorage.setItem(id+'_plan_state', JSON.stringify(payload[id].plan));
                if(payload[id].meta) localStorage.setItem(id+'_meta', JSON.stringify(payload[id].meta));
            });
            location.reload();
        } catch(err){
            alert('Nie udało się wczytać kopii zapasowej.');
        }
    };
    reader.readAsText(file);
}

function updateLastActionInfo(id, type){
    const now = new Date();
    const stamp = now.toLocaleDateString('pl-PL') + ' ' + now.toLocaleTimeString('pl-PL', {hour:'2-digit', minute:'2-digit'});
    const key = id + '_meta';
    let meta = {};
    try { meta = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e){}
    if(type === 'test') meta.lastTest = stamp;
    if(type === 'waterchange') meta.lastWaterChange = stamp;
    localStorage.setItem(key, JSON.stringify(meta));
    renderMetaInfo(id);
}

function renderMetaInfo(id){
    let meta = {};
    try { meta = JSON.parse(localStorage.getItem(id + '_meta') || '{}'); } catch(e){}
    const el = document.getElementById(`meta_${id}`);
    if(!el) return;
    el.innerHTML = `Ostatni test: ${meta.lastTest || '—'}<br>Ostatnia podmiana: ${meta.lastWaterChange || '—'}`;
}


function getMicroWeeklyDrops(id, profile, v){
    let microDaily = profile.microFactor * v / 100;
    let microWeekly = microDaily * 7;
    if(id === 't1') microWeekly = 80;
    if(id === 't2') microWeekly = 0;
    if(id === 't3') microWeekly = 16;
    if(id === 't4') microWeekly = 5;
    return microWeekly;
}

function getAfMicroContribution(id, v, profile){
    const dropsPerWeek = getMicroWeeklyDrops(id, profile, v);
    const mlPerDrop = 4 / 56; // 4 ml / 100L / week = 56 drops / week at 8 drops/day
    const ml = dropsPerWeek * mlPerDrop;

    // Producer values: 1 ml / 10L raises:
    // Fe 0.38 mg/l, K 8.16 mg/l
    const fe = (ml * 0.38 * 10) / v;
    const k = (ml * 8.16 * 10) / v;

    return { dropsPerWeek, ml, fe, k };
}


function buildAlerts(afterWC, target, wc){
    const alerts = [];
    if(wc > 0) alerts.push(`Podmiana ${wc} l została uwzględniona w obliczeniach.`);
    if(target.k > 0 && afterWC.k > target.k * 1.2) alerts.push('K jest już wysokie — nie zwiększaj go bez potrzeby.');
    if(target.fe > 0 && afterWC.fe > target.fe * 1.2) alerts.push('Fe jest powyżej celu — uważaj z mikro i Iron Boost.');
    if(afterWC.po4 < Math.max(0.15, target.po4 * 0.5)) alerts.push('PO4 jest nisko po podmianie.');
    if(afterWC.no3 < Math.max(3, target.no3 * 0.5)) alerts.push('NO3 jest nisko po podmianie.');
    return alerts;
}

function saveMeasurementOnly(id){
    params.concat(['wc']).forEach(p=>{
        const el = document.getElementById(`${p}_${id}`);
        if(el) validateInput(`${p}_${id}`);
    });

    const wc = parseFloat(document.getElementById(`wc_${id}`).value) || 0;
    let rawCurrent = {};
    params.forEach(p=>{
        rawCurrent[p] = parseFloat(document.getElementById(`${p}_${id}`).value) || 0;
    });

    let history = JSON.parse(localStorage.getItem(id+'_history') || '[]');
    const now = new Date();
    const datetime = now.toLocaleDateString('pl-PL') + ' ' + now.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
    history.push({ datetime, wc, raw: rawCurrent });
    if(history.length>30) history.shift();
    localStorage.setItem(id+'_history', JSON.stringify(history));
    saveAllSettings(id);
    updateLastActionInfo(id, 'test');
    if(wc > 0) updateLastActionInfo(id, 'waterchange');
    renderHistory(id);
    renderTrendInfo(id);

    const out = document.getElementById(`out_${id}`);
    if(out){
        out.innerHTML = `<table>
            <tr><td colspan="2"><b>Zapisano sam pomiar</b></td></tr>
            <tr><td>Testy:</td><td>NO3 ${rawCurrent.no3.toFixed(2)}, PO4 ${rawCurrent.po4.toFixed(2)}, K ${rawCurrent.k.toFixed(2)}, Fe ${rawCurrent.fe.toFixed(2)} mg/l</td></tr>
            <tr><td>Podmiana:</td><td>${wc ? wc + ' l' : '—'}</td></tr>
        </table>`;
        savePlanState(id, { html: out.innerHTML, status: (document.getElementById(`plan_status_${id}`)?.textContent || '') });
    }
}

function applySuggestedWaterChange(id){
    const preset = customPresets[id];
    if(!preset || preset.waterChange === undefined) return;
    const wcEl = document.getElementById(`wc_${id}`);
    if(wcEl){
        wcEl.value = preset.waterChange;
        saveAllSettings(id);
    }
}

function applyCustomPreset(id){
    const preset = customPresets[id];
    if(!preset) return;

    const modeSelect = document.getElementById(`tech_${id}`);
    if(modeSelect) modeSelect.value = preset.mode;

    params.forEach(p=>{
        const input = document.getElementById(`t${p}_${id}`);
        if(input){
            input.value = preset.target[p];
            input.dataset.manual = '1';
        }
    });

    applyTechProfile(id, true);
    updateParamColors(id);
    saveAllSettings(id);

    const planBox = document.getElementById(`plan_${id}`);
    if(planBox){
        planBox.setAttribute('data-active', '1');
    }

    const status = document.getElementById(`plan_status_${id}`);
    if(status) status.textContent = 'Plan ustawiony i zapisany.';
    const prev = loadPlanState(id) || {};
    savePlanState(id, { html: prev.html || '', status: 'Plan ustawiony i zapisany.' });
}

function dose(target, current, strength, volume){
    let diff = target - current;
    if(diff <= 0 || !strength || strength <= 0) return 0;
    return (diff * volume) / (strength * 10);
}

function validateInput(id){
    const el = document.getElementById(id);
    let val = parseFloat(el.value);
    if(isNaN(val) || val < 0) el.value = '';
}

function updateParamColors(id){
    params.forEach(p=>{
        const target = parseFloat(document.getElementById(`t${p}_${id}`)?.value) || 0;
        const el = document.getElementById(`${p}_${id}`);
        let val = parseFloat(el.value) || 0;
        el.className = '';
        if(val < target*0.95) el.classList.add('low');
        else if(val > target*1.1) el.classList.add('high');
        else el.classList.add('correct');
        if((p==='fe' && val>1) || (p==='k' && val>50)) el.classList.add('warning');
    });
}

function calc(id){
    params.concat(['wc']).forEach(p=>{
        const el = document.getElementById(`${p}_${id}`);
        if(el) validateInput(`${p}_${id}`);
    });

    const v = effectiveVolumes[id];
    let wc = parseFloat(document.getElementById(`wc_${id}`).value) || 0;
    wc = Math.max(0, Math.min(wc, v));
    document.getElementById(`wc_${id}`).value = wc || '';

    let rawCurrent = {};
    let afterWC = {};
    params.forEach(p=>{
        let val = parseFloat(document.getElementById(`${p}_${id}`).value) || 0;
        rawCurrent[p] = val;
        afterWC[p] = val * (v - wc) / v;
    });

    let strength = {};
    let target = {};
    params.forEach(p=>{
        strength[p] = parseFloat(document.getElementById(`s${p}_${id}`).value) || 0;
        target[p] = parseFloat(document.getElementById(`t${p}_${id}`).value) || 0;
    });

    const modeEl = document.getElementById(`tech_${id}`);
    const mode = modeEl ? modeEl.value : 'high';
    const profile = (typeof techProfiles !== 'undefined' ? techProfiles[mode] : null) || {label:'High Tech', microFactor:8};
    const preset = (typeof customPresets !== 'undefined') ? customPresets[id] : null;

    let weekly = {}, d1 = {}, d2 = {}, d3 = {}, deficit = {};
    let microDaily = profile.microFactor * v / 100;
    let microWeekly = getMicroWeeklyDrops(id, profile, v);
    let micro1 = Math.round(microWeekly * 0.5);
    let micro2 = Math.round(microWeekly * 0.25);
    let micro3 = Math.round(microWeekly * 0.25);
    const microContribution = getAfMicroContribution(id, v, profile);

    params.forEach(p=>{
        weekly[p] = dose(target[p], afterWC[p], strength[p], v);
        deficit[p] = Math.max(0, target[p] - afterWC[p]);
    });

    // AF Micro also contributes K and Fe, so reduce separate K / Iron dosing accordingly
    if(weekly.k > 0){
        const kMlCoveredByMicro = (microContribution.k * v) / (strength.k * 10);
        weekly.k = Math.max(0, weekly.k - kMlCoveredByMicro);
    }
    if(weekly.fe > 0){
        const feMlCoveredByMicro = (microContribution.fe * v) / (strength.fe * 10);
        weekly.fe = Math.max(0, weekly.fe - feMlCoveredByMicro);
    }

    params.forEach(p=>{
        d1[p] = weekly[p] * 0.5;
        d2[p] = weekly[p] * 0.25;
        d3[p] = weekly[p] * 0.25;
    });

    saveAllSettings(id);
    const alerts = buildAlerts(afterWC, target, wc);

    let outHTML = '<div class="readable-plan"><table>';
    outHTML += `<tr><td class="label-col">Tryb nawożenia</td><td><span class="plan-pill">${profile.label}</span></td></tr>`;
    outHTML += `<tr><td colspan="2" class="plan-section-title">Plan 3x w tygodniu wg testów i podmiany</td></tr>`;
    outHTML += `<tr><td colspan="2" class="plan-note">Testy robisz przed podmianą, dawka sobotnia jest liczona po podmianie RO.</td></tr>`;

    outHTML += `<tr><td colspan="2" class="plan-section-title">1. Stan przed podmianą</td></tr>`;
    outHTML += `<tr><td class="label-col">Testy</td><td>
        <span class="plan-pill">NO3 ${rawCurrent.no3.toFixed(2)} mg/l</span>
        <span class="plan-pill">PO4 ${rawCurrent.po4.toFixed(2)} mg/l</span>
        <span class="plan-pill">K ${rawCurrent.k.toFixed(2)} mg/l</span>
        <span class="plan-pill">Fe ${rawCurrent.fe.toFixed(2)} mg/l</span>
    </td></tr>`;

    outHTML += `<tr><td colspan="2" class="plan-section-title">2. Stan po podmianie RO</td></tr>`;
    outHTML += `<tr><td class="label-col">Po podmianie</td><td>
        <span class="plan-pill">NO3 ${afterWC.no3.toFixed(2)} mg/l</span>
        <span class="plan-pill">PO4 ${afterWC.po4.toFixed(2)} mg/l</span>
        <span class="plan-pill">K ${afterWC.k.toFixed(2)} mg/l</span>
        <span class="plan-pill">Fe ${afterWC.fe.toFixed(2)} mg/l</span>
    </td></tr>`;

    outHTML += `<tr><td colspan="2" class="plan-section-title">3. Brak do celu</td></tr>`;
    outHTML += `<tr><td class="label-col">Do uzupełnienia</td><td>
        <span class="plan-pill">NO3 ${deficit.no3.toFixed(2)} mg/l</span>
        <span class="plan-pill">PO4 ${deficit.po4.toFixed(2)} mg/l</span>
        <span class="plan-pill">K ${deficit.k.toFixed(2)} mg/l</span>
        <span class="plan-pill">Fe ${deficit.fe.toFixed(2)} mg/l</span>
    </td></tr>`;

    outHTML += `<tr><td colspan="2" class="plan-section-title">4. Plan dawkowania</td></tr>`;
    outHTML += `<tr><td class="label-col"><span class="plan-day">Sobota po podmianie</span></td><td>
        <span class="plan-dose">N ${d1.no3.toFixed(2)} ml</span>
        <span class="plan-dose">PO4 ${d1.po4.toFixed(2)} ml</span>
        <span class="plan-dose">K ${d1.k.toFixed(2)} ml</span>
        <span class="plan-dose">Fe ${d1.fe.toFixed(2)} ml</span>
        <span class="plan-dose">Micro ${micro1} kropli</span>
    </td></tr>`;
    outHTML += `<tr><td class="label-col"><span class="plan-day">Wtorek</span></td><td>
        <span class="plan-dose">N ${d2.no3.toFixed(2)} ml</span>
        <span class="plan-dose">PO4 ${d2.po4.toFixed(2)} ml</span>
        <span class="plan-dose">K ${d2.k.toFixed(2)} ml</span>
        <span class="plan-dose">Fe ${d2.fe.toFixed(2)} ml</span>
        <span class="plan-dose">Micro ${micro2} kropli</span>
    </td></tr>`;
    outHTML += `<tr><td class="label-col"><span class="plan-day">Czwartek</span></td><td>
        <span class="plan-dose">N ${d3.no3.toFixed(2)} ml</span>
        <span class="plan-dose">PO4 ${d3.po4.toFixed(2)} ml</span>
        <span class="plan-dose">K ${d3.k.toFixed(2)} ml</span>
        <span class="plan-dose">Fe ${d3.fe.toFixed(2)} ml</span>
        <span class="plan-dose">Micro ${micro3} kropli</span>
    </td></tr>`;

    outHTML += `<tr><td class="label-col">Razem tydzień</td><td class="plan-total">
        <span class="plan-pill">N ${weekly.no3.toFixed(2)} ml</span>
        <span class="plan-pill">PO4 ${weekly.po4.toFixed(2)} ml</span>
        <span class="plan-pill">K ${weekly.k.toFixed(2)} ml</span>
        <span class="plan-pill">Fe ${weekly.fe.toFixed(2)} ml</span>
        <span class="plan-pill">Micro ${microWeekly.toFixed(0)} kropli</span><br>
        Podział dawek: 50% sobota po podmianie, 25% wtorek, 25% czwartek.<br>
        <span class="plan-note">Uwzględniono wkład AF Micro do K i Fe. AF Micro wnosi tygodniowo około: K ${microContribution.k.toFixed(2)} mg/l, Fe ${microContribution.fe.toFixed(3)} mg/l.</span>
    </td></tr>`;

    if(alerts.length){
        outHTML += `<tr><td colspan="2" class="alert-box">⚠️ ${alerts.join('<br>⚠️ ')}</td></tr>`;
    }
    outHTML += '</table></div>';
    document.getElementById(`out_${id}`).innerHTML = outHTML;
    updateLastActionInfo(id, 'test');
    if(wc > 0) updateLastActionInfo(id, 'waterchange');
    savePlanState(id, { html: outHTML, status: (document.getElementById(`plan_status_${id}`)?.textContent || '') });

    let history = JSON.parse(localStorage.getItem(id+'_history') || '[]');
    const now = new Date();
    const datetime = now.toLocaleDateString('pl-PL') + ' ' + now.toLocaleTimeString('pl-PL', {hour:'2-digit',minute:'2-digit'});
    history.push({
        datetime, wc, raw: rawCurrent, adjusted: afterWC, target, mode,
        plan3x: {d1, d2, d3, micro1, micro2, micro3, weekly},
        micro: microWeekly.toFixed(0)
    });
    if(history.length>30) history.shift();
    localStorage.setItem(id+'_history', JSON.stringify(history));

    updateParamColors(id);
    renderHistory(id);
}

function renderHistory(id){
    const history = JSON.parse(localStorage.getItem(id+'_history') || '[]');
    let html = '<b>Historia 30 dni:</b><br>';
    history.slice().reverse().forEach(h=>{
        const raw = h.raw || {
            no3: h.no3 ?? 0,
            po4: h.po4 ?? 0,
            k: h.k ?? 0,
            fe: h.fe ?? 0
        };
        const hasPlan = h.plan3x && h.plan3x.d1 && h.plan3x.d2 && h.plan3x.d3;

        html += `<div class="history-entry"><b>${h.datetime}</b>`;
        html += `<table><tr><th>Parametr</th><th>Wynik badanej wody</th><th>Podmiana</th></tr>`;
        html += `<tr><td>🧪 NO3</td><td>${Number(raw.no3 ?? 0).toFixed(2)} mg/l</td><td>${h.wc ? `${h.wc} l` : '–'}</td></tr>`;
        html += `<tr><td>💧 PO4</td><td>${Number(raw.po4 ?? 0).toFixed(2)} mg/l</td><td></td></tr>`;
        html += `<tr><td>🌿 K</td><td>${Number(raw.k ?? 0).toFixed(2)} mg/l</td><td></td></tr>`;
        html += `<tr><td>🔩 Fe</td><td>${Number(raw.fe ?? 0).toFixed(2)} mg/l</td><td></td></tr>`;
        html += `</table>`;

        if(hasPlan){
            html += `<table style="margin-top:8px;"><tr><th>Dzień</th><th>N</th><th>PO4</th><th>K</th><th>Fe</th><th>Micro</th></tr>`;
            html += `<tr><td>Sobota</td><td>${Number(h.plan3x.d1.no3 ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d1.po4 ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d1.k ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d1.fe ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.micro1 ?? 0).toFixed(0)} kropli</td></tr>`;
            html += `<tr><td>Wtorek</td><td>${Number(h.plan3x.d2.no3 ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d2.po4 ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d2.k ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d2.fe ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.micro2 ?? 0).toFixed(0)} kropli</td></tr>`;
            html += `<tr><td>Czwartek</td><td>${Number(h.plan3x.d3.no3 ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d3.po4 ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d3.k ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.d3.fe ?? 0).toFixed(2)} ml</td><td>${Number(h.plan3x.micro3 ?? 0).toFixed(0)} kropli</td></tr>`;
            html += `<tr><th>Razem tydzień</th><th>${Number(h.plan3x.weekly.no3 ?? 0).toFixed(2)} ml</th><th>${Number(h.plan3x.weekly.po4 ?? 0).toFixed(2)} ml</th><th>${Number(h.plan3x.weekly.k ?? 0).toFixed(2)} ml</th><th>${Number(h.plan3x.weekly.fe ?? 0).toFixed(2)} ml</th><th>${Number(h.micro ?? 0).toFixed(0)} kropli</th></tr></table>`;
            if(h.mode){
                html += `<div style="margin-top:6px;color:#aaa;font-size:12px;">Tryb: ${h.mode === 'high' ? 'High Tech' : 'Low Tech'}</div>`;
            }
        } else {
            html += `<div style="margin-top:6px;color:#aaa;font-size:12px;">Brak zapisanego planu dawkowania dla tego wpisu.</div>`;
        }

        html += `</div>`;
    });
    const div = document.getElementById(`history_${id}`);
    div.innerHTML = html;
    div.scrollTop = div.scrollHeight;
}

function clearResults(id){
    params.forEach(p=>document.getElementById(`${p}_${id}`).value='');
    document.getElementById(`wc_${id}`).value='';
    updateParamColors(id);
    document.getElementById(`out_${id}`).innerHTML='';
    saveAllSettings(id);
    savePlanState(id, { html: '', status: (document.getElementById(`plan_status_${id}`)?.textContent || '') });
}
function clearHistory(id){
    localStorage.removeItem(id+'_history');
    document.getElementById(`history_${id}`).innerHTML='<b>Historia 30 dni:</b><br>';
    renderMetaInfo(id);
    renderTrendInfo(id);
}

function showTab(id){
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

    document.getElementById(id).innerHTML=`
    <h3>${volume}L (${effectiveVolumes[id]}L netto)</h3>
    <div class="box">
    <table>
      <tr>
        <td>Podmiana:</td>
        <td>
          <input id="wc_${id}" type="number" title="Ilość wody podmienionej w litrach" oninput="saveAllSettings('${id}')"> l
          ${customPresets[id] && customPresets[id].waterChange !== undefined ? `
            <span style="display:inline-block;margin-left:10px;color:#aaa;">Sugerowana: ${customPresets[id].waterChange} l</span>
            <button onclick="applySuggestedWaterChange('${id}')" style="padding:4px 8px;margin-left:8px;">Ustaw</button>

      <tr><td>💧 PO4:</td><td><input id="po4_${id}" type="number" step="0.1" oninput="updateParamColors('${id}'); saveAllSettings('${id}')"> mg/l</td></tr>
      <tr><td>🌿 K:</td><td><input id="k_${id}" type="number" step="0.1" oninput="updateParamColors('${id}'); saveAllSettings('${id}')"> mg/l</td></tr>
      <tr><td>🔩 Fe:</td><td><input id="fe_${id}" type="number" step="0.01" oninput="updateParamColors('${id}'); saveAllSettings('${id}')"> mg/l</td></tr>
    </table>
    <button onclick="clearResults('${id}')">Wyczyść parametry</button>
    </div>
    <div class="box">
    <b>Tryb nawożenia</b>
    <table>
      <tr>
        <td>Profil:</td>
        <td>
          <select id="tech_${id}" onchange="applyTechProfile('${id}'); saveAllSettings('${id}')" style="margin: 5px; background-color: #1e1e1e; color: #e0e0e0; border: 1px solid #444; padding: 5px; border-radius: 4px;">
            <option value="high">High Tech</option>
            <option value="low">Low Tech</option>
          </select>
        </td>
      </tr>
    </table>

    </div>
    <div class="box">

    <table style="text-align:left;">
      <tr><td>🧪 AF N Boost:</td><td><input id="sno3_${id}" value="9.5" onchange="saveAllSettings('${id}')"> mg/l</td></tr>

      <tr><td>🌿 AF K Boost:</td><td><input id="sk_${id}" value="5" onchange="saveAllSettings('${id}')"> mg/l</td></tr>
      <tr><td>🔩 AF Iron Boost:</td><td><input id="sfe_${id}" value="0.4" onchange="saveAllSettings('${id}')"> mg/l</td></tr>
      <tr><td>💊 AF Micro:</td><td><span id="microinfo_${id}">8 kropli/dzień na 100L</span></td></tr>

    <div class="box">

      <tr><td>💧 PO4:</td><td><input id="tpo4_${id}" value="1" oninput="this.dataset.manual='1'; updateParamColors('${id}'); saveAllSettings('${id}')"> mg/l</td></tr>
      <tr><td>🌿 K:</td><td><input id="tk_${id}" value="20" oninput="this.dataset.manual='1'; updateParamColors('${id}'); saveAllSettings('${id}')"> mg/l</td></tr>

    </div>    ${['t1','t2','t3','t4'].includes(id) ? `<div class="box" id="plan_${id}">

Object.keys(tanks).forEach(id=>{
    createTankUI(id, tanks[id]);
    captureOriginalDefaults(id);
    const loaded = loadAllSettings(id);
    applyTechProfile(id, loaded);
    updateParamColors(id);
    restorePlanView(id);
    renderHistory(id);
    renderTrendInfo(id);
    renderMetaInfo(id);
});
</script>
